name: Strimzi Development Build and Test

on:
  push:
    branches:
      - main
      - development
      - 'feature/**'
      - 'feat/**'
      - 'fix/**'
      - 'bug/**'
    paths:
      - 'strimzi/**'
      - '!strimzi/**/*.md'
      - '.github/workflows/strimzi-development-build-and-test.yml'
      - '.github/actions/strimzi-*/**'
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'strimzi/**'
      - '!strimzi/**/*.md'
      - '.github/workflows/strimzi-development-build-and-test.yml'
      - '.github/actions/strimzi-*/**'
  workflow_call:
    inputs:
      strimzi_version:
        description: 'Strimzi version to build'
        required: false
        type: string
        default: '0.47.0'
      kafka_version:
        description: 'Kafka version to build'
        required: false
        type: string
        default: '3.9.0'
      axon_version:
        description: 'AxonOps version to include'
        required: false
        type: string
        default: '2.0.20'
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Strimzi base image digests - hardcoded for security and reproducibility
  # Format: "strimzi_version+kafka_version": "sha256:digest"
  STRIMZI_DIGESTS: |
    {
      "0.46.0+3.9.0": "sha256:3c976468f590b464bd224fdf0adb45556fccfba6025bc6b770e3fa69f7398b04",
